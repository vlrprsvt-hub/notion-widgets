<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Responsive Flip Clock</title>

<style>

html, body {
    margin: 0;
    width: 100%;
    height: 100%;

    background: #191919;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: hidden;

    font-family: Georgia, serif;
}

.clock {
    display: flex;
    align-items: center;

    gap: clamp(4px, 1vw, 14px);

    width: 100%;
    height: 100%;

    justify-content: center;
}

.time-box {

    position: relative;

    width: clamp(50px, 18vw, 110px);
    height: clamp(65px, 24vw, 140px);

    background: #481827;

    border-radius: clamp(2px, 0.5vw, 6px);

    display: flex;
    align-items: center;
    justify-content: center;

    color: #F5F1E8;

    font-size: clamp(28px, 10vw, 78px);

    font-weight: bold;

    box-shadow:
        0 6px 18px rgba(0,0,0,0.35),
        inset 0 2px 0 rgba(255,255,255,0.04);

    overflow: hidden;

    transform-style: preserve-3d;

    flex-shrink: 1;
}

.time-box::after {

    content: "";

    position: absolute;

    top: 50%;
    left: 0;

    width: 100%;
    height: clamp(1px, 0.15vw, 2px);

    background: rgba(0,0,0,0.35);

    z-index: 5;
}

.number {
    animation: flip 0.6s ease;
}

.separator {

    color: #481827;

    font-size: clamp(24px, 8vw, 72px);

    font-weight: bold;

    margin-top: clamp(-2px, -0.5vw, -10px);

    animation: blink 1s infinite;
}

@keyframes blink {
    50% {
        opacity: 0.25;
    }
}

@keyframes flip {

    0% {
        transform: rotateX(90deg);
        opacity: 0;
    }

    100% {
        transform: rotateX(0deg);
        opacity: 1;
    }
}

</style>
</head>

<body>

<div class="clock">

    <div class="time-box">
        <div class="number" id="hours"></div>
    </div>

    <div class="separator">:</div>

    <div class="time-box">
        <div class="number" id="minutes"></div>
    </div>

</div>

<script>

let previousHours = "";
let previousMinutes = "";

function animateChange(id, value) {

    const element = document.getElementById(id);

    element.classList.remove("number");

    void element.offsetWidth;

    element.innerText = value;

    element.classList.add("number");
}

function updateClock() {

    const now = new Date();

    const hours = now.getHours().toString().padStart(2, '0');
    const minutes = now.getMinutes().toString().padStart(2, '0');

    if(hours !== previousHours) {
        animateChange("hours", hours);
        previousHours = hours;
    }

    if(minutes !== previousMinutes) {
        animateChange("minutes", minutes);
        previousMinutes = minutes;
    }
}

updateClock();

setInterval(updateClock, 1000);

</script>

</body>
</html>
